<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Vivera</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      padding: 50px;
      max-width: 600px;
      width: 100%;
      text-align: center;
    }
    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 32px;
    }
    .subtitle {
      color: #666;
      margin-bottom: 40px;
      font-size: 16px;
    }
    .menu {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 30px;
    }
    a {
      display: block;
      padding: 25px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 16px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }
    a:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.5);
    }
    a.sdr {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    a.kpis {
      background: linear-gradient(135deg, #E4405F 0%, #F77737 100%);
    }
    a.whatsapp {
      background: linear-gradient(135deg, #25D366 0%, #20BA63 100%);
    }
    a.api {
      background: linear-gradient(135deg, #4285F4 0%, #34A853 100%);
    }
    .status {
      background: #f0f0f0;
      padding: 20px;
      border-radius: 8px;
      margin-top: 20px;
      text-align: left;
      font-size: 14px;
      color: #333;
    }
    .status-ok {
      color: #28a745;
      font-weight: bold;
    }
    .icon {
      font-size: 24px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📊 Dashboard Vivera</h1>
    <p class="subtitle">Sistema de Controle e Análise de Performance</p>

    <div class="menu">
      <a href="/sdr" class="sdr">
        <div class="icon">👥</div>
        SDR Dashboard
      </a>

      <a href="/dashboard/kpis" class="kpis">
        <div class="icon">📈</div>
        KPIs
      </a>

      <a href="/dashboard/whatsapp" class="whatsapp">
        <div class="icon">💬</div>
        WhatsApp
      </a>

      <a href="/api/health" class="api">
        <div class="icon">⚙️</div>
        API Health
      </a>
    </div>

    <div class="status">
      <p><span class="status-ok">✓ ONLINE</span> - Sistema operacional</p>
      <p>Versão: 1.0.0</p>
      <p>Última atualização: <span id="lastUpdate">Carregando...</span></p>
    </div>
  </div>

  <script>
    // Verificar status dos endpoints
    async function checkStatus() {
      try {
        const health = await fetch('/api/health');
        const data = await health.json();
        if (data.status === 'ok') {
          document.querySelector('.status-ok').textContent = '✓ ONLINE';
        }
      } catch (e) {
        console.log('Health check falhou');
      }

      // Mostrar última atualização
      const now = new Date();
      document.getElementById('lastUpdate').textContent = now.toLocaleString('pt-BR');
    }

    checkStatus();
    setInterval(checkStatus, 30000); // Check a cada 30s
  </script>
</body>
</html>
