<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel - Vivera Fotos</title>
<style>
  body { font-family: system-ui, -apple-system, sans-serif; max-width: 640px; margin: 32px auto; padding: 0 16px; color: #111; }
  h2 { margin-bottom: 4px; }
  .sub { color: #666; font-size: 14px; margin-bottom: 20px; }
  button { padding: 12px 16px; font-size: 16px; background: #111; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
  button:disabled { opacity: 0.6; }
  button.secondary { background: #eee; color: #111; }
  #status { margin: 16px 0; padding: 12px; border-radius: 6px; display: none; white-space: pre-wrap; }
  #status.ok { background: #e6f4ea; color: #1e4620; display: block; }
  #status.err { background: #fce8e6; color: #611a15; display: block; }
  .patient { border: 1px solid #ddd; border-radius: 8px; padding: 14px; margin-top: 12px; }
  .patient h3 { margin: 0 0 8px; }
  .poses { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  .poses button { padding: 8px 12px; font-size: 14px; }
  .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; margin-top: 12px; }
  .gallery figure { margin: 0; }
  .gallery img { width: 100%; border-radius: 6px; display: block; }
  .gallery figcaption { font-size: 11px; color: #666; text-align: center; margin-top: 4px; }
  a.link { color: #111; }
  .before-after { margin-top: 12px; }
  .before-after img { max-width: 100%; border-radius: 8px; display: block; }
</style>
</head>
<body>
<h2>Painel Vivera Fotos</h2>
<div class="sub">Casa os álbuns do Google Fotos com o nome dos pacientes cadastrados.</div>

<button id="buscarAlbuns">Buscar álbuns do Google Photos</button>
<button id="rodarAuto" class="secondary">Rodar varredura automática agora</button>
<a class="link" href="/cadastro" style="margin-left:12px;">+ cadastrar paciente</a>
<div class="sub" style="margin-top:8px;">A varredura automática também roda sozinha às 8h e 20h todos os dias.</div>
<div id="status"></div>

<div id="albuns"></div>

<h2 style="margin-top:32px;">Pacientes</h2>
<div id="pacientes"></div>

<script>
const statusEl = document.getElementById('status');
const pacientesEl = document.getElementById('pacientes');

async function carregarPacientes() {
  const res = await fetch('/api/patients');
  const patients = await res.json();
  pacientesEl.innerHTML = '';
  patients.forEach(p => {
    const div = document.createElement('div');
    div.className = 'patient';
    div.innerHTML = `
      <h3>${p.name}</h3>
      <div class="poses">
        <button class="secondary" data-id="${p.id}" data-pose="">Todas as fotos</button>
        <button class="secondary" data-id="${p.id}" data-pose="frontal">Frontal</button>
        <button class="secondary" data-id="${p.id}" data-pose="perfil_45">Perfil 45º</button>
        <button class="secondary" data-id="${p.id}" data-pose="lateral">Lateral</button>
      </div>
      <div class="poses">
        <button data-baid="${p.id}" data-bapose="frontal">Gerar antes/depois - Frontal</button>
        <button data-baid="${p.id}" data-bapose="perfil_45">Perfil 45º</button>
        <button data-baid="${p.id}" data-bapose="lateral">Lateral</button>
      </div>
      <div class="before-after" id="before-after-${p.id}"></div>
      <div class="gallery" id="gallery-${p.id}"></div>
    `;
    pacientesEl.appendChild(div);
  });
  pacientesEl.querySelectorAll('button[data-id]').forEach(btn => {
    btn.addEventListener('click', () => verTimeline(btn.dataset.id, btn.dataset.pose));
  });
  pacientesEl.querySelectorAll('button[data-baid]').forEach(btn => {
    btn.addEventListener('click', () => gerarAntesDepois(btn.dataset.baid, btn.dataset.bapose, btn));
  });
}

async function gerarAntesDepois(patientId, pose, btn) {
  const container = document.getElementById('before-after-' + patientId);
  btn.disabled = true;
  container.innerHTML = 'Montando antes/depois...';
  try {
    const res = await fetch(`/api/patients/${patientId}/before-after?pose=${pose}`, { method: 'POST' });
    const data = await res.json();
    if (res.ok) {
      container.innerHTML = `<img src="${data.url}?t=${Date.now()}" alt="Antes e depois">`;
    } else {
      container.innerHTML = 'Erro: ' + data.error;
    }
  } catch (err) {
    container.innerHTML = 'Erro de conexão: ' + err.message;
  } finally {
    btn.disabled = false;
  }
}

async function verTimeline(patientId, pose) {
  const gallery = document.getElementById('gallery-' + patientId);
  gallery.innerHTML = 'Carregando...';
  try {
    const url = '/api/patients/' + patientId + '/timeline' + (pose ? '?pose=' + pose : '');
    const res = await fetch(url);
    const data = await res.json();
    if (!res.ok) { gallery.innerHTML = 'Erro: ' + data.error; return; }
    if (!data.fotos.length) { gallery.innerHTML = 'Nenhuma foto encontrada ainda para esse filtro.'; return; }
    gallery.innerHTML = '';
    data.fotos.forEach(f => {
      const fig = document.createElement('figure');
      const data_ = f.creationTime ? f.creationTime.slice(0, 10) : '';
      fig.innerHTML = `<img src="${f.url}" loading="lazy"><figcaption>${data_} · ${f.pose}</figcaption>`;
      gallery.appendChild(fig);
    });
  } catch (err) {
    gallery.innerHTML = 'Erro de conexão: ' + err.message;
  }
}

const albunsEl = document.getElementById('albuns');

async function buscarAlbuns() {
  const btn = document.getElementById('buscarAlbuns');
  btn.disabled = true;
  statusEl.className = '';
  statusEl.textContent = 'Buscando álbuns do Google Photos...';
  statusEl.style.display = 'block';
  try {
    const res = await fetch('/api/albums');
    const albuns = await res.json();
    if (!res.ok) { statusEl.className = 'err'; statusEl.textContent = 'Erro: ' + albuns.error; return; }

    statusEl.className = 'ok';
    statusEl.textContent = `${albuns.length} álbum(ns) encontrado(s) no Google Photos.`;

    albunsEl.innerHTML = '';
    albuns.forEach(a => {
      const div = document.createElement('div');
      div.className = 'patient';
      if (a.patient) {
        div.innerHTML = `
          <h3>${a.title} <small style="font-weight:normal;color:#666;">(${a.mediaItemsCount || 0} fotos)</small></h3>
          <div>Paciente correspondente: <strong>${a.patient.name}</strong></div>
          <button data-album="${a.albumId}" data-patient="${a.patient.id}" style="margin-top:10px;">Gerar antes/depois</button>
          <div class="status-album" id="status-album-${a.albumId}"></div>
        `;
      } else {
        div.innerHTML = `
          <h3>${a.title} <small style="font-weight:normal;color:#666;">(${a.mediaItemsCount || 0} fotos)</small></h3>
          <div style="color:#888;">Nenhum paciente cadastrado com esse nome ainda.</div>
        `;
      }
      albunsEl.appendChild(div);
    });

    albunsEl.querySelectorAll('button[data-album]').forEach(btn => {
      btn.addEventListener('click', () => processarAlbum(btn.dataset.album, btn.dataset.patient, btn));
    });
  } catch (err) {
    statusEl.className = 'err';
    statusEl.textContent = 'Erro de conexão: ' + err.message;
  } finally {
    btn.disabled = false;
  }
}

async function processarAlbum(albumId, patientId, btn) {
  const statusAlbum = document.getElementById('status-album-' + albumId);
  btn.disabled = true;
  statusAlbum.textContent = 'Processando fotos do álbum...';
  try {
    const res = await fetch(`/api/albums/${albumId}/process`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ patientId }),
    });
    const data = await res.json();
    if (res.ok) {
      statusAlbum.textContent = `Concluído! Fotos no álbum: ${data.scanned}. Novas analisadas: ${data.novasProcessadas}.`;
      carregarPacientes();
    } else {
      statusAlbum.textContent = 'Erro: ' + data.error;
    }
  } catch (err) {
    statusAlbum.textContent = 'Erro de conexão: ' + err.message;
  } finally {
    btn.disabled = false;
  }
}

document.getElementById('buscarAlbuns').addEventListener('click', buscarAlbuns);

document.getElementById('rodarAuto').addEventListener('click', async () => {
  const btn = document.getElementById('rodarAuto');
  btn.disabled = true;
  statusEl.className = 'ok';
  statusEl.textContent = 'Varredura automática iniciada em segundo plano (casa álbuns por nome, processa fotos novas e já gera o antes/depois de cada pose). Isso pode levar alguns minutos - atualize a página daqui a pouco.';
  statusEl.style.display = 'block';
  try {
    await fetch('/api/scheduler/run-now', { method: 'POST' });
  } catch (err) {
    statusEl.className = 'err';
    statusEl.textContent = 'Erro de conexão: ' + err.message;
  } finally {
    btn.disabled = false;
  }
});

carregarPacientes();
</script>
</body>
</html>
