<!DOCTYPE html>
<html>
<head>
  <title>Test Fetch</title>
</head>
<body>
  <h1>Testing Fetch to Proxy</h1>
  <pre id="output"></pre>

  <script>
    const BASE = '/api/pipedrive';
    const output = document.getElementById('output');

    async function test() {
      try {
        output.textContent = 'Tentando fetch...\n';

        const url = BASE + '/users';
        output.textContent += 'URL: ' + url + '\n';

        const response = await fetch(url);
        output.textContent += 'Status: ' + response.status + '\n';

        const data = await response.json();
        output.textContent += 'Success: ' + data.success + '\n';
        output.textContent += 'Users: ' + (data.data ? data.data.length : 0) + '\n';

        if (data.data) {
          data.data.forEach(user => {
            output.textContent += '  - ' + user.name + '\n';
          });
        }
      } catch (error) {
        output.textContent = 'ERRO: ' + error.message + '\n' + error.stack;
      }
    }

    test();
  </script>
</body>
</html>
