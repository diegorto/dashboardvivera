version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: executive_os_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-executive_os}
      POSTGRES_USER: ${DB_USER:-executive_os}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      TZ: America/Sao_Paulo
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - executive_os_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-executive_os}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: executive_os_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - executive_os_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: executive_os_agent
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PYTHONUNBUFFERED: 1
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-executive_os}
      DB_USER: ${DB_USER:-executive_os}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CLAIRIS_EMAIL: ${CLAIRIS_EMAIL}
      CLAIRIS_PASSWORD: ${CLAIRIS_PASSWORD}
      PIPEDRIVE_API_TOKEN: ${PIPEDRIVE_API_TOKEN}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TZ: America/Sao_Paulo
    volumes:
      - ./src:/app/src
      - ./data/exports:/app/data/exports
      - ./data/staging:/app/data/staging
      - ./logs:/app/logs
    networks:
      - executive_os_network
    command: python -m src.main

  grafana:
    image: grafana/grafana:latest
    container_name: executive_os_grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      TZ: America/Sao_Paulo
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - executive_os_network
    depends_on:
      - postgres

  prometheus:
    image: prom/prometheus:latest
    container_name: executive_os_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - executive_os_network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'

volumes:
  postgres_data:
  redis_data:
  grafana_data:
  prometheus_data:

networks:
  executive_os_network:
    driver: bridge
