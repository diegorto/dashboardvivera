version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: executive_os_db
    environment:
      POSTGRES_USER: ${DB_USER:-executive_os}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password}
      POSTGRES_DB: ${DB_NAME:-executive_os}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-executive_os}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: executive_os_cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: executive_os_api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-executive_os}:${DB_PASSWORD:-secure_password}@postgres:5432/${DB_NAME:-executive_os}
      REDIS_URL: redis://redis:6379/0
      CLAIRIS_EMAIL: ${CLAIRIS_EMAIL}
      CLAIRIS_PASSWORD: ${CLAIRIS_PASSWORD}
      PIPEDRIVE_API_TOKEN: ${PIPEDRIVE_API_TOKEN}
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY}
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
