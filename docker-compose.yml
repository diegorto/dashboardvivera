version: '3.8'

services:
  vivera-insights-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: vivera
      POSTGRES_PASSWORD: vivera_secure_2024
      POSTGRES_DB: vivera_insights
    volumes:
      - vivera-insights-db-vol:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "vivera"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - n8n_default
    restart: unless-stopped

  vivera-insights-app:
    image: vivera-insights-app:latest
    container_name: vivera-insights-app
    depends_on:
      vivera-insights-db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "3099:3000"
    volumes:
      - vivera-insights-app-vol:/app/data
    networks:
      - n8n_default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vivera-app.rule=Host(`app.viveraorofacial.com.br`)"
      - "traefik.http.routers.vivera-app.entrypoints=websecure"
      - "traefik.http.routers.vivera-app.tls.certresolver=letsencrypt"
      - "traefik.http.services.vivera-app.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  vivera-insights-db-vol:
    driver: local
  vivera-insights-app-vol:
    driver: local

networks:
  n8n_default:
    external: true
