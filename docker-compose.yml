services:
  vivera-fotos:
    build: ./vivera-fotos
    restart: always
    env_file:
      - ./vivera-fotos/.env
    volumes:
      - ./vivera-fotos/data:/app/data
      - ./vivera-fotos/uploads:/app/uploads
    networks:
      - n8n_default
    labels:
      - traefik.enable=true
      - traefik.http.routers.vivera-fotos.rule=Host(`vivera.srv1522176.hstgr.cloud`)
      - traefik.http.routers.vivera-fotos.tls=true
      - traefik.http.routers.vivera-fotos.entrypoints=web,websecure
      - traefik.http.routers.vivera-fotos.tls.certresolver=mytlschallenge
      - traefik.http.services.vivera-fotos.loadbalancer.server.port=4000

  whatsapp-monitor:
    build: ./whatsapp-monitor
    restart: always
    env_file:
      - ./whatsapp-monitor/.env
    volumes:
      - ./whatsapp-monitor/auth:/app/auth
    ports:
      # acesso direto por IP:porta pra testar sem precisar configurar DNS/Traefik antes
      - "4001:4001"
    networks:
      - n8n_default
    labels:
      - traefik.enable=true
      - traefik.http.routers.whatsapp-monitor.rule=Host(`whatsapp.vivera.srv1522176.hstgr.cloud`)
      - traefik.http.routers.whatsapp-monitor.tls=true
      - traefik.http.routers.whatsapp-monitor.entrypoints=web,websecure
      - traefik.http.routers.whatsapp-monitor.tls.certresolver=mytlschallenge
      - traefik.http.services.whatsapp-monitor.loadbalancer.server.port=4001

networks:
  n8n_default:
    external: true
