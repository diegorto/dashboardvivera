version: '3.8'

# Portas 80/443 pertencem ao traefik do n8n (NUNCA mexer).
# Frontend exposto em 8000, backend em 8001.

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: dashboardvivera-backend
    ports:
      - "8001:3001"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
      LOG_LEVEL: info
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - vivera-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: dashboardvivera-frontend
    ports:
      - "8000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - vivera-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  vivera-network:
    driver: bridge
