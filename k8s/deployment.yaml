apiVersion: v1
kind: ConfigMap
metadata:
  name: executive-os-config
  namespace: executive-os
data:
  LOG_LEVEL: "INFO"
  DEBUG: "false"
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  ENABLE_API_KEY_AUTH: "true"
  ENABLE_RATE_LIMITING: "true"
  ENABLE_CACHING: "true"
  ENABLE_METRICS: "true"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: executive-os
  namespace: executive-os
spec:
  replicas: 2
  selector:
    matchLabels:
      app: executive-os
  template:
    metadata:
      labels:
        app: executive-os
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: executive-os
      containers:
      - name: api
        image: ghcr.io/diegorto/dashboardvivera:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        envFrom:
        - configMapRef:
            name: executive-os-config
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: executive-os-secrets
              key: database-url
        - name: ENCRYPTION_MASTER_KEY
          valueFrom:
            secretKeyRef:
              name: executive-os-secrets
              key: encryption-key
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: executive-os-secrets
              key: redis-url
              optional: true
        - name: PIPEDRIVE_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: executive-os-secrets
              key: pipedrive-token
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        securityContext:
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /app/.cache
      volumes:
      - name: tmp
        emptyDir: {}
      - name: cache
        emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - executive-os
              topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: executive-os
  namespace: executive-os
