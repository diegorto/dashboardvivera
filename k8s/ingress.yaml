apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: executive-os-ingress
  namespace: executive-os
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - executive-os.yourdomain.com
    secretName: executive-os-tls
  rules:
  - host: executive-os.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: executive-os-service
            port:
              number: 80
