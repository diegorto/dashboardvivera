name: Cleanup old dashboard-audit process

on:
  workflow_dispatch:
  push:
    branches:
      - claude/meta-pipe-api-integration-xsxna2
    paths:
      - .github/workflows/cleanup-dashboard-audit.yml

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Stop and remove old pm2 process
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            pm2 delete dashboard-audit || true
            pm2 save
            pm2 list
