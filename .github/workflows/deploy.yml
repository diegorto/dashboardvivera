name: Deploy to Production

on:
  push:
    branches:
      - claude/reinice-ren84r

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: claude/reinice-ren84r

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /home/user/dashboardvivera
            echo "📍 Atualizando código..."
            git fetch origin claude/reinice-ren84r
            git checkout claude/reinice-ren84r
            git pull origin claude/reinice-ren84r

            echo "🛑 Parando containers..."
            docker compose down

            echo "🚀 Iniciando build e deploy..."
            docker compose up -d --build

            echo "✅ Deploy concluído!"
            echo "🔗 Acessar em: http://187.77.249.55:8000"

      - name: Verify deployment
        run: |
          echo "⏳ Aguardando 10s para servidor iniciar..."
          sleep 10

          echo "🔍 Testando endpoint /api/filters/options..."
          curl -s http://187.77.249.55:8000/api/filters/options | head -20 || echo "⚠️ Servidor ainda pode estar iniciando"
