name: Deploy to Production

on:
  push:
    branches: [backup-wip-vps-20260717-1606]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Deploy
        run: |
          set -e
          cd /root/dashboardvivera-prod
          git fetch origin
          git checkout ${{ github.ref_name }}
          git reset --hard origin/${{ github.ref_name }}
          docker-compose build --no-cache
          docker-compose up -d --force-recreate --remove-orphans < /dev/null
          docker-compose exec -T backend npm run migrate --if-present || true

          sleep 10
          if ! curl -sf http://localhost:8001/api/health; then
            echo "Backend health check failed"
            docker-compose logs backend --tail 50
            exit 1
          fi
          echo "Deployment successful"
